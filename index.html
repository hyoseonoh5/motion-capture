<!DOCTYPE html>
<html lang="ko" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strobo Motion Capture</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap');
:root{--bg:#0d1117;--panel:#161b22;--card:#1c2333;--border:#30363d;--accent:#58a6ff;--green:#3fb950;--orange:#f78166;--yellow:#e3b341;--text:#e6edf3;--muted:#8b949e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Noto Sans JP','Noto Sans SC',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* ── 언어 선택 화면 ── */
#langScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow-y:auto;}
.lang-hero{background:linear-gradient(160deg,#0d1f3c 0%,#0d1117 60%);border-bottom:1px solid var(--border);padding:32px 24px 28px;text-align:center;flex-shrink:0;}
.lang-hero .hero-logo{font-size:48px;margin-bottom:12px;}
.lang-hero .hero-app{font-size:13px;color:var(--accent);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.lang-hero .hero-slogan{font-size:17px;font-weight:700;line-height:1.65;color:var(--text);max-width:500px;margin:0 auto 10px;}
.lang-hero .hero-slogan em{color:var(--accent);font-style:normal;}
.lang-hero .hero-sub{font-size:12px;color:var(--muted);margin-top:6px;}
.lang-body{padding:20px 24px;max-width:560px;margin:0 auto;width:100%;}
.lang-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:480px){.lang-grid{grid-template-columns:repeat(3,1fr);}}
.lang-btn{padding:12px 6px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s;touch-action:manipulation;-webkit-tap-highlight-color:rgba(88,166,255,.3);}
.lang-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.08);transform:translateY(-1px);}
.lang-btn .flag{font-size:22px;}
.lang-btn .lname{font-size:12px;}
.lang-btn .lsub{font-size:10px;color:var(--muted);}

/* ── 팁 화면 ── */
#tipScreen{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;overflow-y:auto;}
.tip-header{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tip-header .logo{font-size:20px;}.tip-header h1{font-size:15px;font-weight:700;}
.tip-body{flex:1;padding:20px;max-width:640px;margin:0 auto;width:100%;}
.tip-badge{display:inline-block;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);border-radius:20px;color:var(--accent);font-size:12px;font-weight:700;padding:4px 12px;margin-bottom:14px;}
.tip-body h2{font-size:17px;font-weight:700;margin-bottom:6px;line-height:1.4;}
.tip-body .subtitle{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6;white-space:pre-line;}
.tip-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.tip-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;}
.tip-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
.tip-num.n0{background:rgba(88,166,255,.2);color:var(--accent);}
.tip-num.n1{background:rgba(63,185,80,.2);color:var(--green);}
.tip-num.n2{background:rgba(227,179,65,.2);color:var(--yellow);}
.tip-num.n3{background:rgba(188,140,255,.2);color:#bc8cff;}
.tip-num.n4{background:rgba(247,129,102,.2);color:var(--orange);}
.tip-title{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.4;}
.tip-desc{font-size:11px;color:var(--muted);line-height:1.7;}
.tip-desc strong{color:var(--text);}.tip-desc em{color:var(--accent);font-style:normal;font-weight:600;}
.tip-footer{background:var(--panel);border-top:1px solid var(--border);padding:14px 20px;flex-shrink:0;}
.btn-start{width:100%;max-width:640px;margin:0 auto;display:flex;padding:13px;border-radius:10px;border:none;cursor:pointer;background:var(--green);color:#0d1117;font-family:inherit;font-size:14px;font-weight:700;align-items:center;justify-content:center;gap:8px;transition:filter .15s;}
.btn-start:hover{filter:brightness(1.1);}

/* ── 메인 앱 ── */
#appScreen{display:none;flex:1;flex-direction:column;}
#appScreen.active{display:flex;}
header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:18px;}
header h1{font-size:14px;font-weight:700;}
.hdr-right{margin-left:auto;display:flex;gap:5px;}
.hdr-btn{padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
.wrap{display:flex;flex:1;overflow:hidden;min-height:0;}
.side{width:270px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
@media(max-width:600px){.wrap{flex-direction:column;overflow-y:auto;}.side{width:100%;border-right:none;border-bottom:1px solid var(--border);overflow-y:visible;flex-shrink:0;}.center{min-height:50vw;flex-shrink:0;}}
.sec{padding:14px 16px;border-bottom:1px solid var(--border);}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.atip{font-size:11px;color:var(--muted);line-height:1.6;padding:7px 9px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.15);border-radius:6px;margin-bottom:8px;}
.atip strong{color:var(--accent);}
.sl-row{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.sl-head b{color:var(--text);font-family:'Space Grotesk',monospace;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;}
.num-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.num-row label{font-size:11px;color:var(--muted);flex:1;}
.num-input{width:68px;padding:5px 7px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Grotesk',monospace;font-size:13px;font-weight:600;text-align:right;}
.num-input:focus{outline:none;border-color:var(--accent);}
.btn{width:100%;padding:10px 12px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.btn+.btn{margin-top:5px;}
.btn-blue{background:var(--accent);color:#0d1117;}.btn-blue:hover{filter:brightness(1.15);}
.btn-green{background:var(--green);color:#0d1117;}.btn-green:hover{filter:brightness(1.1);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-red{background:transparent;color:var(--orange);border:1px solid var(--orange);}
.btn:disabled{background:var(--border)!important;color:var(--muted)!important;border-color:transparent!important;cursor:not-allowed;filter:none!important;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px;}
.s-lbl{font-size:10px;color:var(--muted);margin-bottom:2px;}
.s-val{font-family:'Space Grotesk',monospace;font-size:14px;font-weight:700;color:var(--accent);}
.prog-wrap{display:none;margin-top:7px;}
.prog-bar{background:var(--border);border-radius:4px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);width:0%;transition:width .05s;border-radius:4px;}
.prog-txt{font-size:10px;color:var(--muted);margin-top:3px;text-align:center;}
.center{flex:1;background:#111;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#resultCanvas{max-width:100%;max-height:100%;object-fit:contain;display:none;}
.center-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);text-align:center;padding:20px;}
.center-ph svg{opacity:.2;}.center-ph p{font-size:13px;}.center-ph small{font-size:11px;opacity:.6;}
@media(max-width:600px){.center{min-height:56vw;max-height:70vw;}#resultCanvas{width:100%;height:auto;max-height:70vw;}}
[dir="rtl"] .tip-item,[dir="rtl"] .num-row{flex-direction:row-reverse;}
[dir="rtl"] .hdr-right{margin-left:0;margin-right:auto;}
#videoInput{display:none;}
</style>
</head>
<body>

<!-- ══════ 언어 선택 ══════ -->
<div id="langScreen">
  <div class="lang-hero">
    <div class="hero-logo">📸</div>
    <div class="hero-app">Strobo Motion Capture</div>
    <div class="hero-slogan" id="heroSlogan">
      스트로보 궤적을 얻기 위한 동영상을 먼저 찍고<br>
      앱에서 동영상을 올려서 분석해 보세요.<br>
      <em>멋진 스트로보 궤적 사진을 얻으세요!</em>
    </div>
    <div class="hero-sub" id="heroSub">Select your language / 언어를 선택하세요</div>
  </div>
  <div class="lang-body">
    <div class="lang-label">🌐 Language / 언어</div>
    <div class="lang-grid">
      <button class="lang-btn" data-lang="ko" onclick="setLang('ko')"><span class="flag">🇰🇷</span><span class="lname">한국어</span><span class="lsub">Korean</span></button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')"><span class="flag">🇺🇸</span><span class="lname">English</span><span class="lsub">English</span></button>
      <button class="lang-btn" data-lang="es" onclick="setLang('es')"><span class="flag">🇪🇸</span><span class="lname">Español</span><span class="lsub">Spanish</span></button>
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')"><span class="flag">🇫🇷</span><span class="lname">Français</span><span class="lsub">French</span></button>
      <button class="lang-btn" data-lang="de" onclick="setLang('de')"><span class="flag">🇩🇪</span><span class="lname">Deutsch</span><span class="lsub">German</span></button>
      <button class="lang-btn" data-lang="ja" onclick="setLang('ja')"><span class="flag">🇯🇵</span><span class="lname">日本語</span><span class="lsub">Japanese</span></button>
      <button class="lang-btn" data-lang="zh" onclick="setLang('zh')"><span class="flag">🇨🇳</span><span class="lname">中文</span><span class="lsub">Chinese</span></button>
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')"><span class="flag">🇷🇺</span><span class="lname">Русский</span><span class="lsub">Russian</span></button>
      <button class="lang-btn" data-lang="ar" onclick="setLang('ar')"><span class="flag">🇸🇦</span><span class="lname">العربية</span><span class="lsub">Arabic</span></button>
      <button class="lang-btn" data-lang="pt" onclick="setLang('pt')"><span class="flag">🇧🇷</span><span class="lname">Português</span><span class="lsub">Portuguese</span></button>
      <button class="lang-btn" data-lang="hi" onclick="setLang('hi')"><span class="flag">🇮🇳</span><span class="lname">हिन्दी</span><span class="lsub">Hindi</span></button>
      <button class="lang-btn" data-lang="id" onclick="setLang('id')"><span class="flag">🇮🇩</span><span class="lname">Indonesia</span><span class="lsub">Indonesian</span></button>
      <button class="lang-btn" data-lang="sv" onclick="setLang('sv')"><span class="flag">🇸🇪</span><span class="lname">Svenska</span><span class="lsub">Swedish</span></button>
    </div>
  </div>
</div>

<!-- ══════ 팁 화면 ══════ -->
<div id="tipScreen">
  <div class="tip-header">
    <button onclick="showLang()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;cursor:pointer;font-family:inherit;font-size:12px;display:flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backBtn">🌐 언어 선택</span>
    </button>
    <div class="logo" style="margin-left:8px">📸</div>
    <h1 id="tipH1" style="flex:1"></h1>
  </div>
  <div class="tip-body">
    <div class="tip-badge" id="tipBadge"></div>
    <h2 id="tipH2"></h2>
    <p class="subtitle" id="tipSub"></p>
    <div class="tip-list">
      <div class="tip-item"><div class="tip-num n0">0</div><div><div class="tip-title" id="t0t"></div><div class="tip-desc" id="t0d"></div></div></div>
      <div class="tip-item"><div class="tip-num n1">1</div><div><div class="tip-title" id="t1t"></div><div class="tip-desc" id="t1d"></div></div></div>
      <div class="tip-item"><div class="tip-num n2">2</div><div><div class="tip-title" id="t2t"></div><div class="tip-desc" id="t2d"></div></div></div>
      <div class="tip-item"><div class="tip-num n3">3</div><div><div class="tip-title" id="t3t"></div><div class="tip-desc" id="t3d"></div></div></div>
      <div class="tip-item"><div class="tip-num n4">4</div><div><div class="tip-title" id="t4t"></div><div class="tip-desc" id="t4d"></div></div></div>
      <div class="tip-item"><div class="tip-num n5" style="background:rgba(63,185,80,.2);color:#3fb950;">5</div><div><div class="tip-title" id="t5t"></div><div class="tip-desc" id="t5d"></div></div></div>
    </div>
  </div>
  <div class="tip-footer"><button class="btn-start" id="tipStartBtn" onclick="startApp()"></button></div>
</div>

<!-- ══════ 메인 앱 ══════ -->
<div id="appScreen">
  <header>
    <div class="logo">📸</div>
    <h1 id="appTitle"></h1>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="showTip()" id="btnShowTip"></button>
      <button class="hdr-btn" onclick="showLang()">🌐</button>
    </div>
  </header>
  <div class="wrap">
    <aside class="side">
      <div class="sec">
        <div class="sec-title" id="secUpload"></div>
        <div class="atip" id="uploadTip"></div>
        <button class="btn btn-blue" onclick="document.getElementById('videoInput').click()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
          <span id="btnUpload"></span>
        </button>
      </div>
      <div class="sec">
        <div class="sec-title" id="secSettings"></div>
        <div class="num-row"><label id="lblFC"></label><input type="number" class="num-input" id="frameCount" value="10" min="2" max="100"></div>
        <div style="background:rgba(88,166,255,.06);border:1.5px solid rgba(88,166,255,.3);border-radius:10px;padding:12px;margin-bottom:10px;">
          <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;">⚙️ <span id="lblKeySettings"></span></div>
          <div class="sl-row"><div class="sl-head"><span id="lblST"></span><b id="startVal">--</b>s</div><input type="range" id="startSlider" min="0" max="100" value="20" step="1" oninput="updateRange()"></div>
          <div class="sl-row"><div class="sl-head"><span id="lblET"></span><b id="endVal">--</b>s</div><input type="range" id="endSlider" min="0" max="100" value="100" step="1" oninput="updateRange()"></div>
          <div class="sl-row">
            <div class="sl-head"><span id="lblTH"></span><b id="threshVal">20</b></div>
            <input type="range" id="threshSlider" min="3" max="80" value="20" oninput="document.getElementById('threshVal').value=this.value">
          </div>
          <div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:4px;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:6px" id="threshDesc"></div>
        </div>
        <div style="padding:10px 12px;background:rgba(63,185,80,.06);border:1.5px solid rgba(63,185,80,.3);border-radius:10px;margin-bottom:10px;">
          <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;" id="lblRenderMode"></div>
          <div style="display:flex;gap:5px;margin-bottom:6px;">
            <button class="mode-btn" data-mode="natural" onclick="setRenderMode('natural')" style="flex:1;padding:9px 4px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;line-height:1.3;"><span id="lblMode1"></span></button>
            <button class="mode-btn" data-mode="enhanced" onclick="setRenderMode('enhanced')" style="flex:1;padding:9px 4px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;line-height:1.3;"><span id="lblMode2"></span></button>
          </div>
          <div style="font-size:10px;color:var(--muted);line-height:1.5;" id="modeDesc"></div>
        </div>
        <button class="btn btn-green" id="renderBtn" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span id="btnRender"></span>
        </button>
        <div class="prog-wrap" id="progWrap"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div><div class="prog-txt" id="progTxt"></div></div>
      </div>
      <div class="sec">
        <div class="sec-title" id="secResult"></div>
        <button class="btn btn-ghost" id="saveBtn" disabled><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span id="btnSave"></span></button>
        <button class="btn btn-red" id="resetBtn" disabled style="margin-top:5px"><span id="btnReset"></span></button>
      </div>
      <div class="sec">
        <div class="sec-title" id="secData"></div>
        <div class="stat-grid">
          <div class="stat-card"><div class="s-lbl" id="lblDur"></div><div class="s-val" id="stDur">--</div></div>
          <div class="stat-card"><div class="s-lbl" id="lblFr"></div><div class="s-val" id="stFrames">--</div></div>
          <div class="stat-card"><div class="s-lbl" id="lblRes"></div><div class="s-val" id="stRes">--</div></div>
          <div class="stat-card"><div class="s-lbl" id="lblStat"></div><div class="s-val" id="stStatus"></div></div>
        </div>
      </div>
    </aside>
    <div class="center" id="centerArea">
      <canvas id="resultCanvas"></canvas>
      <div class="center-ph" id="centerPh">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <p id="phText"></p><small id="phSmall"></small>
      </div>
    </div>
  </div>
</div>
<video id="vidEl" style="display:none" playsinline></video>
<input type="file" id="videoInput" accept="video/*" style="display:none">

<script>
const T = {
  ko:{slogan:"스트로보 궤적을 얻기 위한 동영상을 먼저 찍고\n앱에서 동영상을 올려서 분석해 보세요.\n멋진 스트로보 궤적 사진을 얻으세요!",sloganEm:"멋진 스트로보 궤적 사진을 얻으세요!",
    app:"스트로보 궤적 캡쳐",badge:"📹 촬영 전 필독",h2:"다중섬광 사진을 잘 찍으려면?",
    sub:"영상을 올리기 전에 아래 촬영 팁을 읽어보세요.\n올바르게 찍어야 깔끔한 궤적 사진이 만들어집니다.",
    start:"✅ 촬영 팁 확인 — 앱 시작",tipBtn:"📋 촬영 팁",

  document.getElementById('lblST').textContent=t.st;
  document.getElementById('lblET').textContent=t.et;
  document.getElementById('lblTH').textContent=t.th;
  document.getElementById('btnRender').textContent=t.rbtn;
  document.getElementById('secResult').textContent=t.res;
  document.getElementById('btnSave').textContent=isMobile?t.savem:t.save;
  document.getElementById('btnReset').textContent=t.reset;
  document.getElementById('secData').textContent=t.data;
  document.getElementById('lblDur').textContent=t.dur;
  document.getElementById('lblFr').textContent=t.fr;
  document.getElementById('lblRes').textContent=t.res2;
  document.getElementById('lblStat').textContent=t.stat;
  document.getElementById('stStatus').textContent=t.sready;
  if(document.getElementById('lblRenderMode')) document.getElementById('lblRenderMode').textContent=t.mrmode||'Render Mode';

  if(document.getElementById('threshDesc')) document.getElementById('threshDesc').textContent=t.itdesc||'';
  const backLabels={'ko':'🌐 언어 선택','en':'🌐 Language','es':'🌐 Idioma','fr':'🌐 Langue','de':'🌐 Sprache','ja':'🌐 言語選択','zh':'🌐 语言选择','ru':'🌐 Язык','ar':'🌐 اللغة','pt':'🌐 Idioma','hi':'🌐 भाषा','id':'🌐 Bahasa','sv':'🌐 Språk'};
  document.getElementById('backBtn').textContent=backLabels[l]||'🌐 Language';

// ── 앱 로직 ──
const videoInput=document.getElementById('videoInput');
const vidEl=document.getElementById('vidEl');
const renderBtn=document.getElementById('renderBtn');
const saveBtn=document.getElementById('saveBtn');
const resetBtn=document.getElementById('resetBtn');
const resultCanvas=document.getElementById('resultCanvas');
const rc=resultCanvas.getContext('2d');
const centerPh=document.getElementById('centerPh');
const progWrap=document.getElementById('progWrap');
const progFill=document.getElementById('progFill');
const progTxt=document.getElementById('progTxt');
const centerArea=document.getElementById('centerArea');
let duration=0,vidW=0,vidH=0;

videoInput.addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  let activated=false;
  
  function onMeta(){
    if(activated)return;
    if(!vidEl.duration||vidEl.duration===0)return;
    activated=true;
    duration=vidEl.duration;
    vidW=vidEl.videoWidth||320;
    vidH=vidEl.videoHeight||240;
    document.getElementById('stDur').textContent=duration.toFixed(2)+'s';
    document.getElementById('stRes').textContent=vidW+'×'+vidH;
    updateRange();
    renderBtn.disabled=false;
    document.getElementById('stStatus').textContent=T[lang].sready;
    adjustLayout();
  }
  
  vidEl.addEventListener('loadedmetadata', onMeta, {once:true});
  vidEl.addEventListener('loadeddata',     onMeta, {once:true});
  vidEl.addEventListener('canplay',        onMeta, {once:true});
  vidEl.addEventListener('durationchange', onMeta, {once:true});
  
  // 폴백 타이머들
  [500,1000,2000,3000].forEach(ms=>{
    setTimeout(()=>{ if(!activated && vidEl.duration>0) onMeta(); }, ms);
  });
  
  vidEl.src=url;
  vidEl.load();
  videoInput.value='';
});

function adjustLayout(){
  if(!isMobile)return;
  const wrap=document.querySelector('.wrap');
  if(vidW>vidH){wrap.style.flexDirection='column';centerArea.style.minHeight=Math.round(window.innerWidth*vidH/vidW)+'px';centerArea.style.maxHeight='none';}
  else{wrap.style.flexDirection='row';centerArea.style.minHeight='';centerArea.style.maxHeight='';}
}
function updateRange(){
  if(!duration)return;
  const s=+document.getElementById('startSlider').value/100*duration;
  const e=+document.getElementById('endSlider').value/100*duration;
  document.getElementById('startVal').textContent=s.toFixed(2);
  document.getElementById('endVal').textContent=e.toFixed(2);
}
function seekTo(t){return new Promise(res=>{vidEl.currentTime=t;vidEl.addEventListener('seeked',res,{once:true});});}

renderBtn.addEventListener('click',async()=>{
  if(!duration)return;
  const t=T[lang];
  const fc=Math.max(2,Math.min(100,+document.getElementById('frameCount').value));
  const s=+document.getElementById('startSlider').value/100*duration;
  const e=+document.getElementById('endSlider').value/100*duration;
  const th=+document.getElementById('threshSlider').value;
  renderBtn.disabled=true;progWrap.style.display='block';
  document.getElementById('stStatus').textContent=t.sproc;
  document.getElementById('stFrames').textContent=fc;
  const vw=vidEl.videoWidth,vh=vidEl.videoHeight;
  const bgC=document.createElement('canvas');bgC.width=vw;bgC.height=vh;const bgc=bgC.getContext('2d');
  const tmpC=document.createElement('canvas');tmpC.width=vw;tmpC.height=vh;const tc=tmpC.getContext('2d');
  const mC=document.createElement('canvas');mC.width=vw;mC.height=vh;const mc=mC.getContext('2d');
  progTxt.textContent=t.pbg;
  // 배경: 영상 첫 프레임 (0초) 단 하나만 사용
  await seekTo(0);
  bgc.drawImage(vidEl,0,0);
  const bgD=bgc.getImageData(0,0,vw,vh).data;
  resultCanvas.width=vw;resultCanvas.height=vh;resultCanvas.style.display='block';centerPh.style.display='none';
  rc.globalAlpha=1;rc.globalCompositeOperation='source-over';
  bgc.putImageData(new ImageData(bgD,vw,vh),0,0);rc.drawImage(bgC,0,0);
  if(isMobile&&vw>vh)centerArea.style.minHeight=Math.round(window.innerWidth*vh/vw)+'px';
  const times=[];for(let i=0;i<fc;i++)times.push(s+(e-s)*i/(fc-1));
  const mode=renderMode; // 'natural' | 'enhanced' | 'marker'

  // enhanced/marker 모드: 겹쳐도 안 지워지게 강도(depth) 추적
  const depthBuf = (mode!=='natural') ? new Float32Array(vw*vh) : null;

  for(let i=0;i<times.length;i++){
    await seekTo(times[i]);tc.drawImage(vidEl,0,0);
    const curr=tc.getImageData(0,0,vw,vh).data;
    const mp=new Uint8ClampedArray(vw*vh*4);

    // 1) 배경 차이값 계산
    const diffMap = new Float32Array(vw*vh);
    for(let px=0;px<vw*vh;px++){
      const j=px*4;
      const dr=Math.abs(curr[j]-bgD[j]),dg=Math.abs(curr[j+1]-bgD[j+1]),db=Math.abs(curr[j+2]-bgD[j+2]);
      diffMap[px]=(dr+dg+db)/3;
    }

    if(mode==='natural'){
      // ── 1. 자연스러운 사진 (단순 임계값) ──
      for(let px=0;px<vw*vh;px++){
        const j=px*4;
        if(diffMap[px]>th){mp[j]=curr[j];mp[j+1]=curr[j+1];mp[j+2]=curr[j+2];mp[j+3]=255;}
      }
      mc.putImageData(new ImageData(mp,vw,vh),0,0);
      rc.globalAlpha=1;rc.globalCompositeOperation='source-over';rc.drawImage(mC,0,0);

    } else {
      // ── 2/3 공통: 구멍 메우기 + depth 우선 ──
      const isObj=new Uint8Array(vw*vh);
      for(let px=0;px<vw*vh;px++) if(diffMap[px]>th) isObj[px]=1;
      const filled=new Uint8Array(isObj);
      for(let y=1;y<vh-1;y++)for(let x=1;x<vw-1;x++){
        const px=y*vw+x;
        if(isObj[px])continue;
        if(diffMap[px]<th*0.5)continue;
        let cnt=isObj[px-1]+isObj[px+1]+isObj[px-vw]+isObj[px+vw]+isObj[px-vw-1]+isObj[px-vw+1]+isObj[px+vw-1]+isObj[px+vw+1];
        if(cnt>=5) filled[px]=1;
      }
      // depth 우선 물체 픽셀 그리기 (2번, 3번 모두 실제 물체 표시)
      for(let px=0;px<vw*vh;px++){
        const j=px*4;
        const d=diffMap[px];
        const strong=filled[px]===1;
        const edge=(!strong && d>th*0.6);
        if(strong||edge){
          if(d<depthBuf[px]*0.9){mp[j+3]=0;continue;}
          depthBuf[px]=Math.max(depthBuf[px],d);
          mp[j]=curr[j];mp[j+1]=curr[j+1];mp[j+2]=curr[j+2];
          mp[j+3]=strong?255:Math.min(255,Math.round((d/th)*200));
        }
      }
      mc.putImageData(new ImageData(mp,vw,vh),0,0);
      rc.globalAlpha=1;rc.globalCompositeOperation='source-over';rc.drawImage(mC,0,0);


    }

    const pct=Math.round(((i+1)/times.length)*100);
    progFill.style.width=pct+'%';progTxt.textContent=t.pcomp+' '+pct+'% ('+(i+1)+'/'+times.length+')';
    if(i%2===0)await new Promise(r=>setTimeout(r,0));
  }
  progFill.style.width='100%';progTxt.textContent=t.pdone;
  setTimeout(()=>{progWrap.style.display='none';},1500);
  renderBtn.disabled=false;saveBtn.disabled=false;resetBtn.disabled=false;
  document.getElementById('stStatus').textContent=t.sdone;
});

saveBtn.addEventListener('click',()=>{
  const t=T[lang];
  if(isMobile){
    const url=resultCanvas.toDataURL('image/png');
    const w=window.open();
    if(w){w.document.write(`<html><head><meta name="viewport" content="width=device-width"><title>Strobo</title><style>body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;padding:12px;gap:10px;}img{max-width:100%;border-radius:8px;}p{color:#aaa;font-size:13px;font-family:sans-serif;text-align:center;}<\/style><\/head><body><p>${t.popup}</p><img src="${url}"><\/body><\/html>`);}
    else alert(t.popblock);
  }else{resultCanvas.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='strobo_'+Date.now()+'.png';a.click();},'image/png');}
});

resetBtn.addEventListener('click',()=>{
  rc.clearRect(0,0,resultCanvas.width,resultCanvas.height);
  resultCanvas.style.display='none';centerPh.style.display='flex';
  saveBtn.disabled=true;resetBtn.disabled=true;
  document.getElementById('stFrames').textContent='--';
  document.getElementById('stStatus').textContent=T[lang].sready;
});
// 렌더 모드 선택 (natural / enhanced / marker)
let renderMode='enhanced';
function setRenderMode(m){
  renderMode=m;
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    const active=btn.getAttribute('data-mode')===m;
    btn.style.borderColor=active?'var(--green)':'var(--border)';
    btn.style.background=active?'rgba(63,185,80,.15)':'transparent';
    btn.style.color=active?'var(--green)':'var(--muted)';
  });
  const t=T[lang];
  const descs={natural:t.mdesc1||'',enhanced:t.mdesc2||''};
  document.getElementById('modeDesc').textContent=descs[m];
}

window.addEventListener('resize',adjustLayout);

// 모바일 터치 지원: lang-btn 터치 이벤트
document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('touchend', function(e){
    e.preventDefault();
    const l = this.getAttribute('data-lang');
    if(l) setLang(l);
  }, {passive:false});
});
