<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스트로보 궤적 캡쳐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--bg:#0d1117;--panel:#161b22;--card:#1c2333;--border:#30363d;--accent:#58a6ff;--green:#3fb950;--orange:#f78166;--yellow:#e3b341;--text:#e6edf3;--muted:#8b949e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
header{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border);}
.logo{font-size:20px;}header h1{font-size:15px;font-weight:700;}header p{font-size:12px;color:var(--muted);margin-left:8px;}
.wrap{display:flex;flex:1;overflow:hidden;min-height:0;}
.side{width:270px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sec{padding:16px;border-bottom:1px solid var(--border);}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.tip{font-size:11px;color:var(--muted);line-height:1.65;padding:8px 10px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.15);border-radius:6px;margin-bottom:10px;}
.tip strong{color:var(--accent);}
.sl-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.sl-head{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.sl-head b{color:var(--text);font-family:'Space Grotesk',monospace;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;}
.btn{width:100%;padding:9px 12px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.btn+.btn{margin-top:6px;}
.btn-blue{background:var(--accent);color:#0d1117;}.btn-blue:hover{filter:brightness(1.15);}
.btn-green{background:var(--green);color:#0d1117;}.btn-green:hover{filter:brightness(1.1);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-red{background:transparent;color:var(--orange);border:1px solid var(--orange);}
.btn:disabled{background:var(--border)!important;color:var(--muted)!important;border-color:transparent!important;cursor:not-allowed;filter:none!important;}

/* 모드 선택 버튼 */
.mode-row{display:flex;gap:6px;margin-bottom:10px;}
.mode-btn{flex:1;padding:8px 4px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.mode-btn.active{border-color:var(--accent);background:rgba(88,166,255,.15);color:var(--accent);}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px;}
.s-lbl{font-size:10px;color:var(--muted);margin-bottom:2px;}
.s-val{font-family:'Space Grotesk',monospace;font-size:16px;font-weight:700;color:var(--accent);}
.prog-wrap{display:none;margin-top:8px;}
.prog-bar{background:var(--border);border-radius:4px;height:6px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);width:0%;transition:width .05s;border-radius:4px;}
.prog-txt{font-size:11px;color:var(--muted);margin-top:4px;text-align:center;}
.center{flex:1;background:#111;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#resultCanvas{max-width:100%;max-height:100%;object-fit:contain;display:none;}
.center-ph{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);text-align:center;padding:20px;}
.center-ph svg{opacity:.25;}.center-ph p{font-size:13px;}.center-ph small{font-size:11px;opacity:.6;}
#videoInput{display:none;}
</style>
</head>
<body>
<header>
  <div class="logo">📸</div>
  <h1>스트로보 궤적 캡쳐</h1>
  <p>슬로모션 영상 → 다중섬광 사진 합성</p>
</header>
<div class="wrap">
  <aside class="side">

    <div class="sec">
      <div class="sec-title">① 영상 업로드</div>
      <input type="file" id="videoInput" accept="video/*">
      <button class="btn btn-blue" onclick="document.getElementById('videoInput').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
        영상 업로드
      </button>
    </div>

    <div class="sec">
      <div class="sec-title">② 물체 색상</div>
      <div class="tip">물체와 배경의 밝기 관계에 따라 선택하세요.</div>
      <div class="mode-row">
        <button class="mode-btn" id="modeLight" onclick="setMode('light')">
          ☀️ 밝은 물체<br><span style="font-size:10px;color:var(--muted)">흰 공, 오렌지 공</span>
        </button>
        <button class="mode-btn active" id="modeDark" onclick="setMode('dark')">
          🌑 어두운 물체<br><span style="font-size:10px;color:var(--muted)">검정 마우스 등</span>
        </button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">③ 합성 설정</div>
      <div class="sl-row">
        <div class="sl-head"><span>프레임 간격 (클수록 점 간격 넓음)</span><b id="stepVal">5</b>프레임</div>
        <input type="range" id="stepSlider" min="1" max="60" value="5"
               oninput="document.getElementById('stepVal').value=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span>투명도 (낮을수록 물체 선명)</span><b id="alphaVal">0.7</b></div>
        <input type="range" id="alphaSlider" min="10" max="100" value="70"
               oninput="document.getElementById('alphaVal').value=(this.value/100).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span>시작 시간</span><b id="startVal">0.0</b>s</div>
        <input type="range" id="startSlider" min="0" max="100" value="0" step="1" oninput="updateRange()">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span>종료 시간</span><b id="endVal">전체</b></div>
        <input type="range" id="endSlider" min="0" max="100" value="100" step="1" oninput="updateRange()">
      </div>
      <button class="btn btn-green" id="renderBtn" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        합성 시작
      </button>
      <div class="prog-wrap" id="progWrap">
        <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        <div class="prog-txt" id="progTxt">처리 중...</div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">④ 결과</div>
      <button class="btn btn-ghost" id="saveBtn" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        이미지 저장
      </button>
      <button class="btn btn-red" id="resetBtn" disabled style="margin-top:6px">다시 합성</button>
    </div>

    <div class="sec">
      <div class="sec-title">데이터</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="s-lbl">영상 길이</div><div class="s-val" id="stDur">--</div></div>
        <div class="stat-card"><div class="s-lbl">합성 프레임</div><div class="s-val" id="stFrames">--</div></div>
        <div class="stat-card"><div class="s-lbl">해상도</div><div class="s-val" id="stRes">--</div></div>
        <div class="stat-card"><div class="s-lbl">상태</div><div class="s-val" id="stStatus">대기</div></div>
      </div>
    </div>

  </aside>

  <div class="center">
    <canvas id="resultCanvas"></canvas>
    <div class="center-ph" id="centerPh">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/>
      </svg>
      <p>슬로모션 영상을 업로드하고 합성 시작을 누르세요</p>
      <small>물체가 한 장에 여러 번 찍힌 스트로보스코픽 사진이 만들어집니다</small>
    </div>
  </div>
</div>

<video id="vidEl" style="display:none" playsinline></video>

<script>
const videoInput   = document.getElementById('videoInput');
const vidEl        = document.getElementById('vidEl');
const renderBtn    = document.getElementById('renderBtn');
const saveBtn      = document.getElementById('saveBtn');
const resetBtn     = document.getElementById('resetBtn');
const resultCanvas = document.getElementById('resultCanvas');
const rc           = resultCanvas.getContext('2d');
const centerPh     = document.getElementById('centerPh');
const progWrap     = document.getElementById('progWrap');
const progFill     = document.getElementById('progFill');
const progTxt      = document.getElementById('progTxt');

let duration = 0;
let mode = 'dark'; // 기본: 어두운 물체

function setMode(m) {
  mode = m;
  document.getElementById('modeLight').classList.toggle('active', m === 'light');
  document.getElementById('modeDark').classList.toggle('active',  m === 'dark');
}

videoInput.addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  vidEl.src = URL.createObjectURL(f);
  vidEl.addEventListener('loadedmetadata', () => {
    duration = vidEl.duration;
    document.getElementById('stDur').textContent = duration.toFixed(2) + 's';
    document.getElementById('stRes').textContent = vidEl.videoWidth + '×' + vidEl.videoHeight;
    updateRange();
    renderBtn.disabled = false;
    document.getElementById('stStatus').textContent = '준비';
  }, {once:true});
  videoInput.value = '';
});

function updateRange() {
  if (!duration) return;
  const s = +document.getElementById('startSlider').value / 100 * duration;
  const e = +document.getElementById('endSlider').value   / 100 * duration;
  document.getElementById('startVal').textContent = s.toFixed(1);
  document.getElementById('endVal').textContent   = e >= duration - 0.05 ? '전체' : e.toFixed(1) + 's';
}

function seekTo(t) {
  return new Promise(res => { vidEl.currentTime = t; vidEl.addEventListener('seeked', res, {once:true}); });
}

renderBtn.addEventListener('click', async () => {
  if (!duration) return;

  const step    = +document.getElementById('stepSlider').value;
  const alpha   = +document.getElementById('alphaSlider').value / 100;
  const startT  = +document.getElementById('startSlider').value / 100 * duration;
  const endT    = +document.getElementById('endSlider').value   / 100 * duration;

  renderBtn.disabled = true;
  progWrap.style.display = 'block';
  document.getElementById('stStatus').textContent = '처리중';

  const vw = vidEl.videoWidth, vh = vidEl.videoHeight;
  resultCanvas.width = vw; resultCanvas.height = vh;
  resultCanvas.style.display = 'block';
  centerPh.style.display = 'none';

  const off = document.createElement('canvas');
  off.width = vw; off.height = vh;
  const oc = off.getContext('2d');

  // ── 배경 프레임 깔기 ──
  // startT 직전 프레임을 배경으로 사용
  progTxt.textContent = '배경 추출 중...';
  await seekTo(Math.max(0, startT - 0.05));
  rc.globalAlpha = 1;
  rc.globalCompositeOperation = 'source-over';
  rc.drawImage(vidEl, 0, 0);

  // 합성 시간 목록
  const intervalSec = step / 30;
  const times = [];
  for (let t = startT; t <= endT + 0.001; t += intervalSec) {
    times.push(Math.min(t, endT));
  }
  document.getElementById('stFrames').textContent = times.length;

  // ── 핵심: 모드별 합성 ──
  // 밝은 물체: lighter → 밝은 픽셀 누적, 어두운 배경은 변화 적음
  // 어두운 물체: multiply → 어두운 픽셀 누적, 밝은 배경은 변화 적음
  //   but multiply는 CSS filter처럼 동작해 Canvas에서 지원 안 됨
  //   대신: source-over + 낮은 alpha로 여러 번 덧칠 → 어두운 물체가 진해짐
  //   또는: darken (각 픽셀에서 더 어두운 값 선택) → 가장 정확

  if (mode === 'light') {
    rc.globalCompositeOperation = 'lighter';
    rc.globalAlpha = alpha * 0.5; // lighter는 포화 빠르므로 더 낮게
  } else {
    // 어두운 물체: darken 모드
    // darken: 각 픽셀에서 min(현재, 새 프레임) → 어두운 픽셀(물체)이 누적
    rc.globalCompositeOperation = 'darken';
    rc.globalAlpha = 1; // darken은 alpha 필요 없음 (픽셀값 비교)
  }

  for (let i = 0; i < times.length; i++) {
    await seekTo(times[i]);
    oc.drawImage(vidEl, 0, 0);
    rc.drawImage(off, 0, 0);

    const pct = Math.round(((i + 1) / times.length) * 100);
    progFill.style.width = pct + '%';
    progTxt.textContent  = `합성 중... ${pct}% (${i+1}/${times.length})`;
    if (i % 3 === 0) await new Promise(r => setTimeout(r, 0));
  }

  progFill.style.width = '100%';
  progTxt.textContent  = '완료! ✓';
  setTimeout(() => { progWrap.style.display = 'none'; }, 1500);

  renderBtn.disabled = false;
  saveBtn.disabled   = false;
  resetBtn.disabled  = false;
  document.getElementById('stStatus').textContent = '완료';
});

saveBtn.addEventListener('click', () => {
  resultCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '스트로보_' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.png';
    a.click();
  }, 'image/png');
});

resetBtn.addEventListener('click', () => {
  rc.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
  resultCanvas.style.display = 'none';
  centerPh.style.display = 'flex';
  saveBtn.disabled = true; resetBtn.disabled = true;
  document.getElementById('stFrames').textContent = '--';
  document.getElementById('stStatus').textContent = '준비';
});
</script>
</body>
</html>
